name: Open Core Boundary

on:
  pull_request:
  push:
    branches:
      - main
      - 1.2-maintenance

jobs:
  boundary:
    if: github.repository == 'YuanShiJiLoong/author'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check open-core boundary
        run: npm run check:open-core-boundary
